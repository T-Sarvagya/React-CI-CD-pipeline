name: Sample React CI Pipeline/Workflow

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check node version
        run: node -v

      - name: Clone the repository
        uses: actions/checkout@v3